# Optional Render Blueprint — import repo or create Web Service manually (see DEPLOY.md)
services:
  - type: web
    name: crafthouse-media-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: CONTACT_EMAIL
        sync: false
